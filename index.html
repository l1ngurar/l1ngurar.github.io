<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>СкладРасклад</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-64.png">
    <link rel="apple-touch-icon" href="icon-256.png">
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui; background: #f0f2f5; margin: 0; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .screen { display: none; }
        .screen.active { display: block; }
        h1 { font-size: 1.6rem; text-align: center; }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        button {
            background: white;
            border: 1px solid #ccc;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #1e88e5; color: white; border: none; }
        .btn-danger { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
        .nav-btn { font-size: 1.2rem; padding: 6px 14px; }
        details {
            background: white;
            border-radius: 24px;
            margin-bottom: 12px;
            padding: 0;
        }
        summary {
            padding: 14px 18px;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            border-bottom: 1px solid #eef2f7;
        }
        summary::after { content: "▼"; float: right; }
        details[open] summary::after { transform: rotate(180deg); }
        .group-content { padding: 16px; }
        .chip-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
        }
        .chip {
            background: #f0f0f0;
            border-radius: 40px;
            padding: 6px 16px;
            cursor: pointer;
        }
        .chip.active {
            background: #1e88e5;
            color: white;
        }
        .color-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .color-info { display: flex; gap: 10px; align-items: center; }
        .color-icon { font-size: 26px; }
        .counter {
            display: flex;
            gap: 8px;
            background: #f8f9fa;
            border-radius: 40px;
            padding: 4px 8px;
        }
        .counter button {
            background: none;
            border: none;
            font-size: 22px;
            width: 36px;
        }
        .counter input {
            width: 55px;
            text-align: center;
            font-size: 18px;
            border: 1px solid #ddd;
            border-radius: 30px;
        }
        .preview-box {
            background: #1e2a36;
            color: #eef2ff;
            padding: 16px;
            border-radius: 24px;
            font-family: monospace;
            white-space: pre-wrap;
            margin: 20px 0;
        }
        .history-item {
            background: #fafafa;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
        }
        .history-header {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .history-preview {
            padding: 0 16px 12px;
            font-family: monospace;
            font-size: 12px;
            max-height: 80px;
            overflow: hidden;
        }
        .history-full {
            display: none;
            padding: 12px 16px;
            background: white;
            font-family: monospace;
            border-top: 1px solid #ddd;
        }
        .history-item.open .history-full { display: block; }
        .history-item.open .history-preview { display: none; }
        .history-actions {
            padding: 8px 16px 12px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            border-top: 1px solid #ddd;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="toast" class="toast"></div>

    <!-- ПРИВЕТСТВИЕ -->
    <div id="welcomeScreen" class="screen active">
        <div class="header-row">
            <h1>📱 СкладРасклад</h1>
            <button id="welcomeThemeToggle" class="nav-btn">🌙</button>
        </div>
        <div style="text-align: center; margin: 40px 0;">
            <p>Создаватель склад-расклада :D</p>
            <button id="newFromWelcomeBtn" class="btn-primary" style="margin-top: 20px;">✨ Новый склад-расклад</button>
            <button id="historyFromWelcomeBtn" style="margin-top: 16px;">📜 История</button>
        </div>
    </div>

    <!-- РЕДАКТОР -->
    <div id="editorScreen" class="screen">
        <div class="header-row">
            <button id="backToWelcomeFromEditor" class="nav-btn">←</button>
            <h1>Редактор</h1>
            <button id="editorThemeToggle" class="nav-btn">🌙</button>
        </div>
        <div class="toolbar">
            <button id="resetBtn" class="btn-danger">✨ Обнулить всё</button>
            <button id="finishBtn" class="btn-primary">✅ Завершить</button>
        </div>
        <input type="text" id="searchInput" placeholder="🔍 Поиск модели" style="width:100%; padding:10px; border-radius:40px; margin-bottom:16px;">
        <div id="modelsContainer"></div>
    </div>

    <!-- ПРЕВЬЮ -->
    <div id="previewScreen" class="screen">
        <div class="header-row">
            <button id="backToEditorFromPreview" class="nav-btn">←</button>
            <h1>Превью</h1>
            <button id="previewThemeToggle" class="nav-btn">🌙</button>
        </div>
        <div id="previewMessage" class="preview-box"></div>
        <div class="toolbar" style="justify-content: center;">
            <button id="copyAndFinishBtn" class="btn-primary">📋 Скопировать и завершить</button>
            <button id="homeFromPreview">🏠 Домой</button>
        </div>
    </div>

    <!-- ИСТОРИЯ -->
    <div id="historyScreen" class="screen">
        <div class="header-row">
            <button id="backToWelcomeFromHistory" class="nav-btn">←</button>
            <h1>История</h1>
            <button id="historyThemeToggle" class="nav-btn">🌙</button>
        </div>
        <button id="clearHistoryBtn" class="btn-danger" style="display: block; margin: 0 auto 16px auto;">🗑 Очистить всю историю</button>
        <div id="historyList"></div>
        <div id="historyEmptyMsg" style="text-align: center; margin-top: 40px;">Здесь ничего нет. Сделай склад-расклад и нажми «Завершить»</div>
    </div>
</div>

<script>
(function() {
    // ---------- МОДЕЛИ ----------
    const GROUPS = [
        { name: "X", variants: ["64", "256"] },
        { name: "XS", variants: ["64", "256", "512"] },
        { name: "XS Max", variants: ["64", "256", "512"] },
        { name: "XR", variants: ["64", "128", "256"] },
        { name: "11", variants: ["64", "128", "256"] },
        { name: "11 Pro", variants: ["64", "256", "512"] },
        { name: "11 Pro Max", variants: ["64", "256", "512"] },
        { name: "12 Mini", variants: ["64", "128", "256"] },
        { name: "12", variants: ["64", "128", "256"] },
        { name: "12 Pro", variants: ["128", "256", "512"] },
        { name: "12 Pro Max", variants: ["128", "256", "512"] },
        { name: "13 Mini", variants: ["128", "256", "512"] },
        { name: "13", variants: ["128", "256", "512"] },
        { name: "13 Pro", variants: ["128", "256", "512", "1TB"] },
        { name: "13 Pro Max", variants: ["128", "256", "512", "1TB"] },
        { name: "14", variants: ["128", "256", "512"] },
        { name: "14 Plus", variants: ["128", "256", "512"] },
        { name: "14 Pro", variants: ["128", "256", "512", "1TB"] },
        { name: "14 Pro Max", variants: ["128", "256", "512", "1TB"] },
        { name: "15", variants: ["128", "256", "512"] },
        { name: "15 Plus", variants: ["128", "256", "512"] },
        { name: "15 Pro", variants: ["128", "256", "512", "1TB"] },
        { name: "15 Pro Max", variants: ["256", "512", "1TB"] },
        { name: "16", variants: ["128", "256", "512"] },
        { name: "16 Plus", variants: ["128", "256", "512"] },
        { name: "16 Pro", variants: ["128", "256", "512", "1TB"] },
        { name: "16 Pro Max", variants: ["256", "512", "1TB"] }
    ];

    const colorNames = {
        "🖤": "чёрный", "🤍": "белый", "💛": "жёлтый / золотой / пустынный титан",
        "🧡": "коралловый", "💚": "зелёный", "💙": "синий", "💜": "фиолетовый",
        "❤️": "красный", "🩷": "розовый", "🩶": "титан"
    };

    function getColorsForModel(fullModel) {
        if (fullModel.startsWith("X ")) return ["🖤", "🤍"];
        if (fullModel.includes("XS")) return ["🖤", "🤍", "💛"];
        if (fullModel.includes("XR")) return ["🖤", "🤍", "💙", "💛", "🧡", "❤️"];
        if (fullModel.startsWith("11 ") && !fullModel.includes("Pro")) return ["🖤", "🤍", "💚", "💛", "❤️", "💜"];
        if (fullModel.includes("11 Pro")) return ["🖤", "🤍", "💚", "💛"];
        if (fullModel.includes("12 Mini") || fullModel === "12 64" || fullModel === "12 128" || fullModel === "12 256")
            return ["🖤", "🤍", "💚", "💙", "❤️", "💜"];
        if (fullModel.includes("12 Pro") && !fullModel.includes("Max")) return ["🖤", "🤍", "💛", "💙"];
        if (fullModel.includes("12 Pro Max")) return ["🖤", "🤍", "💛", "💙"];
        if (fullModel.includes("13 Mini")) return ["🖤", "🤍", "💙", "🩷", "💚", "❤️"];
        if (fullModel.startsWith("13 ") && !fullModel.includes("Pro")) return ["🖤", "🤍", "💙", "🩷", "💚", "❤️"];
        if (fullModel.includes("13 Pro")) return ["🖤", "🤍", "💙", "💛", "💚"];
        if (fullModel.includes("14 Plus")) return ["🖤", "🤍", "💙", "💜", "💛"];
        if (fullModel.includes("14 Pro")) return ["🖤", "🤍", "💜", "💛"];
        if (fullModel.startsWith("14 ") && !fullModel.includes("Plus") && !fullModel.includes("Pro"))
            return ["🖤", "🤍", "💙", "💜", "❤️", "💛"];
        if ((fullModel.startsWith("15 ") && !fullModel.includes("Pro")) || fullModel.includes("15 Plus"))
            return ["🖤", "💙", "💚", "🩷", "💛"];
        if (fullModel.includes("15 Pro")) return ["🖤", "🤍", "💙", "🩶"];
        if ((fullModel.startsWith("16 ") && !fullModel.includes("Pro")) || fullModel.includes("16 Plus"))
            return ["🖤", "🤍", "💙", "🩷", "💚"];
        if (fullModel.includes("16 Pro")) return ["🖤", "🤍", "🩶", "💛"];
        return ["🖤", "🤍", "💛", "💚", "💙", "❤️", "🩷"];
    }

    // ---------- ДАННЫЕ ----------
    let stock = {};
    let savedReports = [];    // переименовано, чтобы не конфликтовать с window.history
    let searchTerm = "";
    let openGroups = new Set();
    let selectedVariant = {};

    const STORAGE_CURRENT = "sklad_current";
    const STORAGE_REPORTS = "sklad_reports";

    function initStock() {
        const empty = {};
        for (let group of GROUPS) {
            empty[group.name] = {};
            for (let v of group.variants) {
                const full = `${group.name} ${v}`;
                const colors = getColorsForModel(full);
                empty[group.name][v] = {};
                for (let c of colors) empty[group.name][v][c] = 0;
            }
        }
        return empty;
    }

    function loadData() {
        const saved = localStorage.getItem(STORAGE_CURRENT);
        if (saved) {
            try {
                stock = JSON.parse(saved);
                for (let group of GROUPS) {
                    if (!stock[group.name]) stock[group.name] = {};
                    for (let v of group.variants) {
                        if (!stock[group.name][v]) stock[group.name][v] = {};
                        const full = `${group.name} ${v}`;
                        const colors = getColorsForModel(full);
                        for (let c of colors) {
                            if (stock[group.name][v][c] === undefined) stock[group.name][v][c] = 0;
                        }
                    }
                }
            } catch(e) { stock = initStock(); }
        } else {
            stock = initStock();
        }
        const savedReportsStr = localStorage.getItem(STORAGE_REPORTS);
        if (savedReportsStr) {
            try { savedReports = JSON.parse(savedReportsStr); } catch(e) { savedReports = []; }
        } else {
            savedReports = [];
        }
        for (let g of GROUPS) {
            if (selectedVariant[g.name] === undefined) selectedVariant[g.name] = g.variants[0];
        }
    }

    function saveCurrent() { localStorage.setItem(STORAGE_CURRENT, JSON.stringify(stock)); }
    function saveReports() { 
        if (savedReports.length > 50) savedReports = savedReports.slice(0,50);
        localStorage.setItem(STORAGE_REPORTS, JSON.stringify(savedReports));
    }

    function resetAll() {
        for (let group of GROUPS) {
            for (let v of group.variants) {
                const full = `${group.name} ${v}`;
                const colors = getColorsForModel(full);
                for (let c of colors) stock[group.name][v][c] = 0;
            }
        }
        saveCurrent();
        renderEditor();
    }

    function generateMessage() {
        let lines = [];
        for (let group of GROUPS) {
            for (let v of group.variants) {
                const parts = [];
                const colors = getColorsForModel(`${group.name} ${v}`);
                for (let c of colors) {
                    let val = stock[group.name]?.[v]?.[c] || 0;
                    if (val > 0) parts.push(`${val}${c}`);
                }
                if (parts.length) lines.push(`${group.name} ${v} - ${parts.join(" ")}`);
            }
        }
        return lines.join("\n");
    }

    function saveToReports() {
        const msg = generateMessage();
        const copy = JSON.parse(JSON.stringify(stock));
        savedReports.unshift({
            id: Date.now(),
            date: new Date().toISOString(),
            stock: copy,
            fullMessage: msg
        });
        if (savedReports.length > 50) savedReports.pop();
        saveReports();
    }

    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.style.opacity = "1";
        setTimeout(() => toast.style.opacity = "0", 2000);
    }

    async function copyToClipboard(text, successMsg) {
        try {
            await navigator.clipboard.writeText(text);
            showToast(successMsg);
        } catch(e) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast(successMsg);
        }
    }

    // ---------- ОТРИСОВКА РЕДАКТОРА ----------
    function renderEditor() {
        const container = document.getElementById("modelsContainer");
        if (!container) return;

        const currentOpen = new Set();
        document.querySelectorAll("#modelsContainer details[open]").forEach(d => {
            const s = d.querySelector("summary");
            if (s) currentOpen.add(s.innerText.trim());
        });
        openGroups = currentOpen;

        container.innerHTML = "";
        let anyVisible = false;
        for (let group of GROUPS) {
            const match = searchTerm === "" || group.name.toLowerCase().includes(searchTerm.toLowerCase());
            if (match) anyVisible = true;
            const details = document.createElement("details");
            details.className = match ? "" : "hidden-group";
            if (openGroups.has(group.name)) details.open = true;
            const summary = document.createElement("summary");
            summary.innerText = group.name;
            details.appendChild(summary);

            const contentDiv = document.createElement("div");
            contentDiv.className = "group-content";

            const chipBar = document.createElement("div");
            chipBar.className = "chip-bar";
            for (let v of group.variants) {
                const chip = document.createElement("div");
                chip.className = "chip";
                if (selectedVariant[group.name] === v) chip.classList.add("active");
                chip.innerText = v;
                chip.onclick = (e) => {
                    e.stopPropagation();
                    selectedVariant[group.name] = v;
                    renderEditor();
                };
                chipBar.appendChild(chip);
            }
            contentDiv.appendChild(chipBar);

            const currentVariant = selectedVariant[group.name] || group.variants[0];
            const fullModel = `${group.name} ${currentVariant}`;
            const colors = getColorsForModel(fullModel);
            for (let col of colors) {
                const val = stock[group.name][currentVariant][col] || 0;
                const row = document.createElement("div");
                row.className = "color-row";
                row.innerHTML = `
                    <div class="color-info">
                        <span class="color-icon">${col}</span>
                        <span>${colorNames[col]}</span>
                    </div>
                    <div class="counter">
                        <button class="minus-btn">−</button>
                        <input type="number" value="${val}" step="1">
                        <button class="plus-btn">+</button>
                    </div>
                `;
                const minusBtn = row.querySelector(".minus-btn");
                const plusBtn = row.querySelector(".plus-btn");
                const input = row.querySelector("input");
                minusBtn.onclick = () => {
                    let newVal = (stock[group.name][currentVariant][col] || 0) - 1;
                    if (newVal < 0) newVal = 0;
                    stock[group.name][currentVariant][col] = newVal;
                    saveCurrent();
                    renderEditor();
                };
                plusBtn.onclick = () => {
                    let newVal = (stock[group.name][currentVariant][col] || 0) + 1;
                    stock[group.name][currentVariant][col] = newVal;
                    saveCurrent();
                    renderEditor();
                };
                input.onchange = (e) => {
                    let v = parseInt(e.target.value, 10);
                    if (isNaN(v)) v = 0;
                    if (v < 0) v = 0;
                    stock[group.name][currentVariant][col] = v;
                    saveCurrent();
                    renderEditor();
                };
                contentDiv.appendChild(row);
            }
            details.appendChild(contentDiv);
            container.appendChild(details);
        }
        if (!anyVisible && searchTerm) {
            const msg = document.createElement("div");
            msg.style.textAlign = "center";
            msg.style.padding = "20px";
            msg.innerText = "😕 Модели не найдены";
            container.appendChild(msg);
        }
    }

    function renderHistory() {
        const container = document.getElementById("historyList");
        const emptyMsg = document.getElementById("historyEmptyMsg");
        if (!container) return;
        if (savedReports.length === 0) {
            container.innerHTML = "";
            emptyMsg.style.display = "block";
            return;
        }
        emptyMsg.style.display = "none";
        container.innerHTML = "";
        for (let rep of savedReports) {
            const dateStr = new Date(rep.date).toLocaleString();
            const full = rep.fullMessage;
            const preview = full.split("\n").slice(0,3).join("\n") + (full.split("\n").length > 3 ? "\n..." : "");
            const div = document.createElement("div");
            div.className = "history-item";
            div.innerHTML = `
                <div class="history-header">
                    <div>📅 ${escapeHtml(dateStr)}</div>
                    <div class="history-expand-icon">▼</div>
                </div>
                <div class="history-preview">${escapeHtml(preview)}</div>
                <div class="history-full">${escapeHtml(full)}</div>
                <div class="history-actions">
                    <button class="copy-report-btn" data-id="${rep.id}">📋 Копировать</button>
                    <button class="edit-report-btn" data-id="${rep.id}">✏️ Редактировать</button>
                    <button class="delete-report-btn" data-id="${rep.id}">🗑 Удалить</button>
                </div>
            `;
            container.appendChild(div);
            const header = div.querySelector(".history-header");
            header.addEventListener("click", (e) => {
                if (e.target.tagName === 'BUTTON') return;
                div.classList.toggle("open");
            });
        }
        document.querySelectorAll(".copy-report-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const rep = savedReports.find(r => r.id === id);
                if (rep) copyToClipboard(rep.fullMessage, "Скопировано");
            });
        });
        document.querySelectorAll(".edit-report-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const rep = savedReports.find(r => r.id === id);
                if (rep) {
                    stock = JSON.parse(JSON.stringify(rep.stock));
                    saveCurrent();
                    renderEditor();
                    showScreen("editor");
                }
            });
        });
        document.querySelectorAll(".delete-report-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                if (confirm("Удалить этот отчёт?")) {
                    savedReports = savedReports.filter(r => r.id !== id);
                    saveReports();
                    renderHistory();
                }
            });
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    // ---------- УПРАВЛЕНИЕ ЭКРАНАМИ ----------
    function showScreen(name) {
        document.getElementById("welcomeScreen").classList.remove("active");
        document.getElementById("editorScreen").classList.remove("active");
        document.getElementById("previewScreen").classList.remove("active");
        document.getElementById("historyScreen").classList.remove("active");
        document.getElementById(name + "Screen").classList.add("active");
        if (name === "history") renderHistory();
        if (name === "editor") renderEditor();
    }

    // ---------- ТЁМНАЯ ТЕМА ----------
    function initTheme() {
        const saved = localStorage.getItem("theme");
        const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (saved === "dark" || (!saved && dark)) {
            document.body.style.background = "#121212";
            document.body.style.color = "#e0e0e0";
        } else {
            document.body.style.background = "#f0f2f5";
            document.body.style.color = "#1e2a36";
        }
    }
    function toggleTheme() {
        if (document.body.style.background === "rgb(18, 18, 18)" || document.body.style.background === "#121212") {
            document.body.style.background = "#f0f2f5";
            document.body.style.color = "#1e2a36";
            localStorage.setItem("theme", "light");
        } else {
            document.body.style.background = "#121212";
            document.body.style.color = "#e0e0e0";
            localStorage.setItem("theme", "dark");
        }
    }

    // ---------- PWA ----------
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
    }

    // ---------- ЗАПУСК ----------
    document.addEventListener("DOMContentLoaded", () => {
        loadData();
        initTheme();
        renderEditor();

        // Кнопки приветствия
        document.getElementById("newFromWelcomeBtn").onclick = () => {
            resetAll();
            showScreen("editor");
        };
        document.getElementById("historyFromWelcomeBtn").onclick = () => {
            renderHistory();
            showScreen("history");
        };
        document.getElementById("welcomeThemeToggle").onclick = toggleTheme;

        // Редактор
        document.getElementById("resetBtn").onclick = () => { if (confirm("Обнулить всё?")) resetAll(); };
        document.getElementById("finishBtn").onclick = () => {
            const msg = generateMessage();
            document.getElementById("previewMessage").innerText = msg;
            showScreen("preview");
        };
        document.getElementById("backToWelcomeFromEditor").onclick = () => showScreen("welcome");
        document.getElementById("editorThemeToggle").onclick = toggleTheme;
        document.getElementById("searchInput").addEventListener("input", (e) => {
            searchTerm = e.target.value;
            renderEditor();
        });

        // Превью
        document.getElementById("copyAndFinishBtn").onclick = async () => {
            const msg = generateMessage();
            await copyToClipboard(msg, "✅ Скопировано и сохранено!");
            saveToReports();
            resetAll();
            showScreen("welcome");
        };
        document.getElementById("backToEditorFromPreview").onclick = () => showScreen("editor");
        document.getElementById("homeFromPreview").onclick = () => showScreen("welcome");
        document.getElementById("previewThemeToggle").onclick = toggleTheme;

        // История
        document.getElementById("clearHistoryBtn").onclick = () => {
            if (confirm("Очистить всю историю?")) {
                savedReports = [];
                saveReports();
                renderHistory();
            }
        };
        document.getElementById("backToWelcomeFromHistory").onclick = () => showScreen("welcome");
        document.getElementById("historyThemeToggle").onclick = toggleTheme;

        showScreen("welcome");
    });
})();
</script>
</body>
</html>
