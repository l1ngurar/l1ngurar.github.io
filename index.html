<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>СкладРасклад</title>
    <meta name="theme-color" id="themeColorMeta" content="#f0f2f5">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./icon-64.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-page: #f8f9fc; --surface: #ffffff; --surface-2: #f1f3f7;
            --text-primary: #1c2a3a; --text-secondary: #5b6e8c; --text-tertiary: #8e9eae;
            --border: #e9edf2; --primary: #1e88e5; --primary-dark: #0b5e9e;
            --danger: #e53935; --danger-bg: #ffebee;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.02);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08); --transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --radius-card: 24px; --radius-btn: 40px; --overlay-bg: rgba(0,0,0,0.5);
        }
        body.dark {
            --bg-page: #121212; --surface: #1e1e2a; --surface-2: #2a2a36;
            --text-primary: #eceef2; --text-secondary: #a3b3c6; --text-tertiary: #6c7a8e;
            --border: #2c2c3a; --primary: #0d6efd; --primary-dark: #0a58ca;
            --danger: #ff7b72; --danger-bg: #3e1a1a;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3); --shadow-md: 0 8px 24px rgba(0,0,0,0.5);
            --overlay-bg: rgba(0,0,0,0.7);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-page); color: var(--text-primary); line-height: 1.3; padding-bottom: 65px; }
        .app-container { max-width: 700px; margin: 0 auto; padding: 12px 16px 20px; min-height: 80vh; display: flex; flex-direction: column; }
        .screen { display: none; animation: fadeIn 0.25s ease; flex: 1; }
        .screen.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .app-header {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
            padding: 4px 0;
        }
        .app-header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), #6c5ce7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }
        .welcome-header h1 { font-size: 1.6rem; }
        .app-header .icon-btn:first-child {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        .app-header .icon-btn:last-child {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        .icon-btn {
            background: var(--surface);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            line-height: 1;
            padding: 0;
        }
        .icon-btn:active { transform: scale(0.94); background: var(--surface-2); }
        .card { background: var(--surface); border-radius: var(--radius-card); box-shadow: var(--shadow-sm); margin-bottom: 16px; overflow: hidden; transition: var(--transition); }
        .btn { border: none; background: var(--surface-2); padding: 10px 16px; border-radius: var(--radius-btn); font-size: 0.95rem; font-weight: 500; color: var(--text-primary); cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 2px 6px rgba(30,136,229,0.3); }
        .btn-primary:active { background: var(--primary-dark); transform: scale(0.96); }
        .btn-danger { background: var(--danger-bg); color: var(--danger); }
        .btn-danger:active { background: #ffcdd2; transform: scale(0.96); }
        .btn:active { transform: scale(0.96); }
        
        .install-banner {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            margin-bottom: 16px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }
        .install-banner:active { transform: scale(0.98); background: var(--primary-dark); }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 6px 16px 18px;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            font-size: 0.7rem;
            color: var(--text-tertiary);
            gap: 3px;
            cursor: pointer;
            transition: var(--transition);
            padding: 4px 12px;
            border-radius: 30px;
        }
        .nav-item.active { color: var(--primary); background: var(--surface-2); }
        .nav-item span:first-child { font-size: 1.3rem; }
        .nav-item:active { transform: scale(0.92); }
        
        .editor-welcome-card {
            text-align: center;
            padding: 32px 20px;
            margin: auto 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .editor-welcome-card.fade-out {
            opacity: 0;
            transform: scale(0.98);
            pointer-events: none;
        }
        .editor-active {
            transition: opacity 0.2s ease, transform 0.2s ease;
            opacity: 0;
            transform: translateY(8px);
            display: none;
        }
        .editor-active.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        .editor-welcome-card h3 {
            font-size: 1.4rem;
            margin-bottom: 24px;
        }
        .editor-welcome-card .btn {
            width: 100%;
            margin-bottom: 12px;
        }
        
        .search-wrapper { position: relative; margin-bottom: 16px; }
        .search-wrapper input { width: 100%; padding: 12px 48px 12px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 44px; font-size: 0.95rem; color: var(--text-primary); outline: none; transition: var(--transition); }
        .search-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,136,229,0.2); }
        .search-clear { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--text-tertiary); display: none; }
        
        .groups-scroll { overflow-x: auto; white-space: nowrap; padding-bottom: 10px; margin-bottom: 12px; scrollbar-width: thin; -webkit-overflow-scrolling: touch; }
        .groups-chips { display: inline-flex; gap: 8px; padding: 2px 0; }
        .group-chip { background: var(--surface-2); padding: 6px 18px; border-radius: 40px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s ease, transform 0.1s ease; display: inline-block; }
        .group-chip.active { background: var(--primary); color: white; }
        .group-chip:active { transform: scale(0.94); }
        
        .group-card { background: var(--surface); border-radius: 24px; padding: 16px; box-shadow: var(--shadow-sm); margin-bottom: 16px; transition: box-shadow 0.2s; }
        .group-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); }
        .chip-bar { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 10px; }
        .chip { background: var(--surface-2); padding: 6px 14px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: background 0.2s ease, color 0.2s ease, transform 0.1s ease; }
        .chip.active { background: var(--primary); color: white; }
        .chip:active { transform: scale(0.94); }
        
        .color-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; transition: opacity 0.15s ease, transform 0.15s ease; }
        .color-list.fade-out { opacity: 0; transform: translateY(4px); }
        .color-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface-2); padding: 8px 12px; border-radius: 20px; transition: all 0.1s ease; }
        .color-info { display: flex; align-items: center; gap: 8px; }
        .color-icon { font-size: 22px; }
        .color-name { font-weight: 500; font-size: 0.85rem; color: var(--text-secondary); }
        .counter { display: flex; align-items: center; gap: 4px; background: var(--surface); border-radius: 28px; padding: 2px; }
        .counter button { background: var(--surface-2); border: none; width: 30px; height: 30px; border-radius: 26px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: var(--text-primary); transition: var(--transition); }
        .counter button:active { background: var(--border); transform: scale(0.92); }
        .counter input { width: 40px; text-align: center; font-size: 0.9rem; font-weight: 500; background: transparent; border: none; color: var(--text-primary); font-family: monospace; outline: none; }
        .counter input::-webkit-outer-spin-button, .counter input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .counter input[type=number] { -moz-appearance: textfield; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--overlay-bg); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; visibility: hidden; opacity: 0; transition: opacity 0.2s, visibility 0.2s; padding: 20px; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background: var(--surface); border-radius: 28px; max-width: 500px; width: 100%; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-md); animation: modalPop 0.2s ease; }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-header h3 { font-size: 1.2rem; font-weight: 600; margin: 0; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-tertiary); padding: 0; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 20px; transition: var(--transition); }
        .modal-close:active { background: var(--surface-2); transform: scale(0.94); }
        .modal-body { padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.4; background: var(--surface-2); margin: 14px; border-radius: 20px; max-height: 50vh; overflow: auto; }
        .modal-footer { padding: 10px 18px 18px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .modal-footer .btn { flex: 1; min-width: 100px; text-align: center; white-space: nowrap; }
        
        .history-item { background: var(--surface); border-radius: 20px; margin-bottom: 10px; padding: 14px; box-shadow: var(--shadow-sm); cursor: pointer; transition: var(--transition); display: flex; justify-content: space-between; align-items: center; }
        .history-item:active { transform: scale(0.98); background: var(--surface-2); }
        .history-date { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }
        .history-preview { font-family: monospace; font-size: 0.75rem; color: var(--text-tertiary); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .history-right { text-align: right; }
        .history-chevron { font-size: 1.1rem; color: var(--text-tertiary); }
        
        .toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: var(--text-primary); color: var(--bg-page); padding: 8px 18px; border-radius: 40px; font-size: 0.8rem; z-index: 210; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-md); }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-tertiary); }
        
        @media (max-width: 480px) { .app-header h1 { font-size: 1rem; } .welcome-header h1 { font-size: 1.3rem; } }
        
        .editor-actions-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .editor-actions-bar .btn {
            flex: 1;
        }
        .welcome-card {
            margin: auto 0;
        }
        .theme-btn-active {
            background: var(--primary) !important;
            color: white !important;
        }
    </style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="app-container">
    <div id="installBanner" class="install-banner" style="display: none;">📲 Установить приложение</div>

    <div id="welcomeScreen" class="screen active">
        <div class="app-header welcome-header">
            <h1>СкладРасклад</h1>
            <button id="welcomeThemeToggle" class="icon-btn">🌙</button>
        </div>
        <div class="card welcome-card" style="text-align: center; padding: 32px 20px;">
            <img src="./icon-256.png" alt="logo" style="width: 80px; height: 80px; border-radius: 20px; margin-bottom: 16px;">
            <p style="margin: 16px 0 24px; color: var(--text-secondary); font-size: 1rem;">Создаватель склад-расклада :D</p>
            <button id="goToEditorBtn" class="btn btn-primary" style="width: 100%;">Перейти в редактор →</button>
        </div>
        <footer style="text-align: center; font-size: 12px; margin-top: 24px;">
            Первая в истории конторы приблуда для<br>
            упрощения еженедельной рутины.<br>
            Навайбкодил с любовью ❤️
        </footer>
    </div>

    <div id="editorScreen" class="screen">
        <div class="app-header">
            <button id="editorBackBtn" class="icon-btn" style="display: none;">←</button>
            <h1 id="editorTitle">Редактор</h1>
            <button id="editorThemeToggle" class="icon-btn">🌙</button>
        </div>
        
        <div id="editorWelcomeCard" class="card editor-welcome-card">
            <h3>✨ Что хотите сделать?</h3>
            <button id="newInEditorBtn" class="btn btn-primary">✨ Новый склад-расклад</button>
            <button id="draftInEditorBtn" class="btn" style="display: none;">📂 Открыть черновик</button>
        </div>
        
        <div id="editorActiveContent" class="editor-active">
            <div class="editor-actions-bar">
                <button id="resetActiveBtn" class="btn btn-danger">🔄 Обнулить всё</button>
                <button id="finishActiveBtn" class="btn btn-primary">✅ Завершить</button>
            </div>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Поиск модели...">
                <button id="searchClearBtn" class="search-clear">✕</button>
            </div>
            <div class="groups-scroll" id="groupsScroll"><div class="groups-chips" id="groupsChips"></div></div>
            <div id="selectedGroupCard" class="group-card">
                <div class="group-title" id="groupTitle"></div>
                <div class="chip-bar" id="variantsChips"></div>
                <div id="colorsList" class="color-list"></div>
            </div>
        </div>
    </div>

    <div id="historyScreen" class="screen">
        <div class="app-header">
            <button id="historyBackBtn" class="icon-btn">←</button>
            <h1>История</h1>
            <button id="historyThemeToggle" class="icon-btn">🌙</button>
        </div>
        <button id="clearHistoryBtn" class="btn btn-danger" style="width: 100%; margin-bottom: 16px;">Очистить всю историю</button>
        <div id="historyList"></div>
        <div id="historyEmptyMsg" class="empty-state">Здесь ничего нет. Сделай склад-расклад и нажми «Завершить»</div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-item" data-screen="welcome"><span>🏠</span><span>Главная</span></button>
    <button class="nav-item" data-screen="editor"><span>✏️</span><span>Редактор</span></button>
    <button class="nav-item" data-screen="history"><span>📜</span><span>История</span></button>
</div>

<div id="previewModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>📄 Превью</h3><button class="modal-close" id="previewModalCloseBtn">&times;</button></div><div class="modal-body" id="modalPreviewMessage"></div><div class="modal-footer"><button id="modalCopyFinishBtn" class="btn btn-primary">📋 Скопировать и завершить</button></div></div></div>
<div id="historyModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3 id="historyModalTitle"></h3><button class="modal-close" id="historyModalCloseBtn">&times;</button></div><div class="modal-body" id="historyModalMessage"></div><div class="modal-footer"><button id="historyModalCopyBtn" class="btn btn-primary">Копировать</button><button id="historyModalEditBtn" class="btn">Редактировать</button><button id="historyModalDeleteBtn" class="btn btn-danger">Удалить</button></div></div></div>

<div id="themeModal" class="modal-overlay" style="z-index: 300;">
    <div class="modal-content" style="max-width: 280px;">
        <div class="modal-header">
            <h3>Оформление</h3>
            <button class="modal-close" id="themeModalCloseBtn">&times;</button>
        </div>
        <div class="modal-body" style="display: flex; flex-direction: column; gap: 12px; padding: 16px; background: none; margin: 0;">
            <button id="themeLightBtn" class="btn" style="justify-content: flex-start;">☀️ Светлая</button>
            <button id="themeDarkBtn" class="btn" style="justify-content: flex-start;">🌙 Тёмная</button>
            <button id="themeSystemBtn" class="btn" style="justify-content: flex-start;">🖥️ Как в системе</button>
        </div>
    </div>
</div>

<script>
(function(){
    const GROUPS = [
        { name: "X", variants: ["64","256"] }, { name: "XS", variants: ["64","256","512"] }, { name: "XS Max", variants: ["64","256","512"] },
        { name: "XR", variants: ["64","128","256"] }, { name: "11", variants: ["64","128","256"] }, { name: "11 Pro", variants: ["64","256","512"] },
        { name: "11 Pro Max", variants: ["64","256","512"] }, { name: "12 Mini", variants: ["64","128","256"] }, { name: "12", variants: ["64","128","256"] },
        { name: "12 Pro", variants: ["128","256","512"] }, { name: "12 Pro Max", variants: ["128","256","512"] }, { name: "13 Mini", variants: ["128","256","512"] },
        { name: "13", variants: ["128","256","512"] }, { name: "13 Pro", variants: ["128","256","512","1TB"] }, { name: "13 Pro Max", variants: ["128","256","512","1TB"] },
        { name: "14", variants: ["128","256","512"] }, { name: "14 Plus", variants: ["128","256","512"] }, { name: "14 Pro", variants: ["128","256","512","1TB"] },
        { name: "14 Pro Max", variants: ["128","256","512","1TB"] }, { name: "15", variants: ["128","256","512"] }, { name: "15 Plus", variants: ["128","256","512"] },
        { name: "15 Pro", variants: ["128","256","512","1TB"] }, { name: "15 Pro Max", variants: ["256","512","1TB"] }, { name: "16", variants: ["128","256","512"] },
        { name: "16 Plus", variants: ["128","256","512"] }, { name: "16 Pro", variants: ["128","256","512","1TB"] }, { name: "16 Pro Max", variants: ["256","512","1TB"] }
    ];

    function getColors(modelName) {
        let colors;
        if (modelName.startsWith("X ")) colors = ["🖤","🤍"];
        else if (modelName.includes("XS")) colors = ["🖤","🤍","💛"];
        else if (modelName.includes("XR")) colors = ["🖤","🤍","💙","💛","🧡","❤️"];
        else if (modelName.startsWith("11 ") && !modelName.includes("Pro")) colors = ["🖤","🤍","💚","💛","❤️","💜"];
        else if (modelName.includes("11 Pro")) colors = ["🖤","🤍","💚","💛"];
        else if (modelName.includes("12 Mini") || modelName === "12 64" || modelName === "12 128" || modelName === "12 256") colors = ["🖤","🤍","💚","💙","❤️","💜"];
        else if (modelName.includes("12 Pro") && !modelName.includes("Max")) colors = ["🖤","🤍","💛","💙"];
        else if (modelName.includes("12 Pro Max")) colors = ["🖤","🤍","💛","💙"];
        else if (modelName.includes("13 Mini")) colors = ["🖤","🤍","💙","🩷","💚","❤️"];
        else if (modelName.startsWith("13 ") && !modelName.includes("Pro")) colors = ["🖤","🤍","💙","🩷","💚","❤️"];
        else if (modelName.includes("13 Pro")) colors = ["🖤","🤍","💙","💛","💚"];
        else if (modelName.includes("14 Plus")) colors = ["🖤","🤍","💙","💜","💛"];
        else if (modelName.includes("14 Pro")) colors = ["🖤","🤍","💜","💛"];
        else if (modelName.startsWith("14 ") && !modelName.includes("Plus") && !modelName.includes("Pro")) colors = ["🖤","🤍","💙","💜","❤️","💛"];
        else if ((modelName.startsWith("15 ") && !modelName.includes("Pro")) || modelName.includes("15 Plus")) colors = ["🖤","💙","💚","🩷","💛"];
        else if (modelName.includes("15 Pro")) colors = ["🖤","🤍","💙","🩶"];
        else if ((modelName.startsWith("16 ") && !modelName.includes("Pro")) || modelName.includes("16 Plus")) colors = ["🖤","🤍","💙","🩷","💚"];
        else if (modelName.includes("16 Pro")) colors = ["🖤","🤍","🩶","💛"];
        else colors = ["🖤","🤍","💛","💚","💙","❤️","🩷"];
        
        const hasRed = colors.includes("❤️");
        const hasYellow = colors.includes("💛");
        if (hasRed) colors = colors.filter(c => c !== "❤️");
        if (hasYellow) colors = colors.filter(c => c !== "💛");
        if (hasRed) colors.push("❤️");
        if (hasYellow) colors.push("💛");
        return colors;
    }

    function getColorName(color, modelName) {
        if (color !== "💛") {
            const staticNames = { "🖤":"чёрный","🤍":"белый","🧡":"коралловый","💚":"зелёный","💙":"синий","💜":"фиолетовый","❤️":"красный","🩷":"розовый","🩶":"титан" };
            return staticNames[color] || color;
        }
        const isXS = modelName.includes("XS");
        const isPro = modelName.includes("Pro");
        const is16Pro = modelName.includes("16 Pro");
        if (is16Pro) return "пустынный";
        if (isXS || isPro) return "золотой";
        return "жёлтый";
    }

    let stock = {};
    let savedHistory = [];
    let searchTerm = "";
    let selectedGroup = GROUPS[0].name;
    let selectedVariant = {};
    let hasDraft = false;
    let searchDebounce;
    let currentEditDate = null;
    let editorActive = false;
    let currentThemeMode = "system";
    let animationTimer = null;
    
    const STORAGE_CURRENT = "sklad_grouped";
    const STORAGE_HISTORY = "sklad_history";
    const STORAGE_SELECTED_GROUP = "sklad_selected_group";

    function initStock() { let st = {}; for (let g of GROUPS) { st[g.name] = {}; for (let v of g.variants) { st[g.name][v] = {}; let cols = getColors(`${g.name} ${v}`); for (let c of cols) st[g.name][v][c] = 0; } } return st; }
    
    function loadData() {
        let saved = localStorage.getItem(STORAGE_CURRENT);
        if (saved) try { stock = JSON.parse(saved); } catch(e) { stock = initStock(); }
        else stock = initStock();
        for (let g of GROUPS) {
            if (!stock[g.name]) stock[g.name] = {};
            for (let v of g.variants) {
                if (!stock[g.name][v]) stock[g.name][v] = {};
                let cols = getColors(`${g.name} ${v}`);
                for (let c of cols) if (stock[g.name][v][c] === undefined) stock[g.name][v][c] = 0;
            }
        }
        let savedHist = localStorage.getItem(STORAGE_HISTORY);
        if (savedHist) try { savedHistory = JSON.parse(savedHist); } catch(e) { savedHistory = []; }
        if (!Array.isArray(savedHistory)) savedHistory = [];
        let savedGroup = localStorage.getItem(STORAGE_SELECTED_GROUP);
        if (savedGroup && GROUPS.some(g => g.name === savedGroup)) selectedGroup = savedGroup;
        else selectedGroup = GROUPS[0].name;
        for (let g of GROUPS) if (!selectedVariant[g.name]) selectedVariant[g.name] = g.variants[0];
        checkDraft();
        setEditorDateFromNow();
    }
    
    function saveCurrent() { localStorage.setItem(STORAGE_CURRENT, JSON.stringify(stock)); }
    function saveHistory() { if (savedHistory.length>50) savedHistory=savedHistory.slice(0,50); localStorage.setItem(STORAGE_HISTORY, JSON.stringify(savedHistory)); }
    function saveSelectedGroup() { localStorage.setItem(STORAGE_SELECTED_GROUP, selectedGroup); }
    
    function checkDraft() {
        for (let g of GROUPS) {
            for (let v of g.variants) {
                for (let c of getColors(`${g.name} ${v}`)) {
                    if ((stock[g.name]?.[v]?.[c]||0) !== 0) {
                        hasDraft = true;
                        return;
                    }
                }
            }
        }
        hasDraft = false;
    }
    
    function setDraft() { if (!hasDraft) { hasDraft = true; updateDraftButtons(); } }
    function clearDraft() { hasDraft = false; updateDraftButtons(); }
    
    function updateDraftButtons() {
        const draftBtns = document.querySelectorAll('#draftInEditorBtn');
        draftBtns.forEach(btn => {
            if (hasDraft) btn.style.display = 'flex';
            else btn.style.display = 'none';
        });
    }
    
    function resetAllData() {
        for (let g of GROUPS) {
            for (let v of g.variants) {
                for (let c of getColors(`${g.name} ${v}`)) {
                    stock[g.name][v][c] = 0;
                }
            }
        }
        saveCurrent();
        clearDraft();
        selectedGroup = GROUPS[0].name;
        saveSelectedGroup();
        for (let g of GROUPS) selectedVariant[g.name] = g.variants[0];
        setEditorDateFromNow();
    }
    
    function formatDate(date) { let d = new Date(date); return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`; }
    function setEditorDateFromNow() { 
        currentEditDate = new Date(); 
        if (editorActive) updateEditorTitleByState(); 
    }
    function setEditorDateFromHistory(dateStr) { 
        currentEditDate = new Date(dateStr); 
        if (editorActive) updateEditorTitleByState(); 
    }
    
    function updateEditorTitleByState() {
        const titleElem = document.getElementById("editorTitle");
        if (!titleElem) return;
        if (editorActive && currentEditDate) {
            titleElem.textContent = `Склад-расклад от ${formatDate(currentEditDate)}`;
        } else {
            titleElem.textContent = "Редактор";
        }
    }
    
    function scrollToActiveGroupChip() {
        const activeChip = document.querySelector(".group-chip.active");
        if (activeChip) activeChip.scrollIntoView({ behavior: "auto", block: "nearest", inline: "center" });
    }
    
    function renderGroupsChips() {
        const container = document.getElementById("groupsChips");
        if (!container) return;
        let filteredGroups = GROUPS;
        if (searchTerm) filteredGroups = GROUPS.filter(g => g.name.toLowerCase().includes(searchTerm.toLowerCase()));
        container.innerHTML = "";
        for (let g of filteredGroups) {
            let chip = document.createElement("div");
            chip.className = "group-chip";
            if (selectedGroup === g.name) chip.classList.add("active");
            chip.textContent = g.name;
            chip.onclick = (e) => {
                e.stopPropagation();
                if (selectedGroup === g.name) return;
                for (let child of container.children) child.classList.remove("active");
                chip.classList.add("active");
                selectedGroup = g.name;
                saveSelectedGroup();
                renderGroupContent();
                scrollToActiveGroupChip();
            };
            container.appendChild(chip);
        }
        if (filteredGroups.length === 0) {
            let emptyDiv = document.createElement("div");
            emptyDiv.textContent = "😕 Модели не найдены";
            emptyDiv.style.padding = "10px";
            emptyDiv.style.color = "var(--text-tertiary)";
            container.appendChild(emptyDiv);
        }
        scrollToActiveGroupChip();
    }
    
    function renderGroupContent() {
        const group = GROUPS.find(g => g.name === selectedGroup);
        if (!group) return;
        const colorsContainer = document.getElementById("colorsList");
        if (!colorsContainer) return;
        
        colorsContainer.classList.add("fade-out");
        if (animationTimer) clearTimeout(animationTimer);
        animationTimer = setTimeout(() => {
            document.getElementById("groupTitle").textContent = group.name;
            
            const variantsContainer = document.getElementById("variantsChips");
            const currentVariant = selectedVariant[group.name] || group.variants[0];
            if (variantsContainer.children.length === 0) {
                for (let v of group.variants) {
                    let chip = document.createElement("div");
                    chip.className = "chip";
                    chip.textContent = v;
                    chip.onclick = (e) => {
                        e.stopPropagation();
                        if (selectedVariant[group.name] === v) return;
                        for (let child of variantsContainer.children) child.classList.remove("active");
                        chip.classList.add("active");
                        selectedVariant[group.name] = v;
                        renderGroupContent();
                    };
                    variantsContainer.appendChild(chip);
                }
            }
            for (let chip of variantsContainer.children) {
                if (chip.textContent === currentVariant) chip.classList.add("active");
                else chip.classList.remove("active");
            }
            
            const fullModelName = `${group.name} ${currentVariant}`;
            const colors = getColors(fullModelName);
            colorsContainer.innerHTML = "";
            for (let col of colors) {
                let val = stock[group.name][currentVariant][col] || 0;
                let row = document.createElement("div");
                row.className = "color-row";
                let left = document.createElement("div");
                left.className = "color-info";
                left.innerHTML = `<span class="color-icon">${col}</span><span class="color-name">${getColorName(col, fullModelName)}</span>`;
                row.appendChild(left);
                let counter = document.createElement("div");
                counter.className = "counter";
                let btnMinus = document.createElement("button");
                btnMinus.textContent = "−";
                btnMinus.onclick = (e) => {
                    e.stopPropagation();
                    let newVal = Math.max(0, val-1);
                    updateStockColor(group.name, currentVariant, col, newVal);
                };
                let input = document.createElement("input");
                input.type = "number";
                input.value = val;
                input.onchange = (e) => {
                    let vv = parseInt(e.target.value);
                    if(isNaN(vv)) vv=0;
                    if(vv<0) vv=0;
                    updateStockColor(group.name, currentVariant, col, vv);
                };
                let btnPlus = document.createElement("button");
                btnPlus.textContent = "+";
                btnPlus.onclick = (e) => {
                    e.stopPropagation();
                    updateStockColor(group.name, currentVariant, col, val+1);
                };
                counter.append(btnMinus, input, btnPlus);
                row.appendChild(counter);
                colorsContainer.appendChild(row);
            }
            colorsContainer.classList.remove("fade-out");
        }, 120);
    }
    
    function updateStockColor(group, variant, color, val) {
        stock[group][variant][color] = val;
        saveCurrent();
        setDraft();
        const rows = document.querySelectorAll(`#colorsList .color-row`);
        for (let row of rows) {
            const iconSpan = row.querySelector('.color-icon');
            if (iconSpan && iconSpan.textContent === color) {
                const input = row.querySelector('input');
                if (input) input.value = val;
                break;
            }
        }
    }
    
    function activateEditorWithData(reset = false) {
        if (reset) resetAllData();
        const welcomeCard = document.getElementById("editorWelcomeCard");
        const activeContent = document.getElementById("editorActiveContent");
        
        // Убедимся, что карточка видна перед анимацией
        welcomeCard.style.display = "block";
        welcomeCard.classList.remove("fade-out");
        // Принудительно сбросим opacity для активного контента, если он был
        activeContent.classList.remove("active");
        activeContent.style.opacity = "";
        
        // Анимация исчезновения карточки
        welcomeCard.classList.add("fade-out");
        setTimeout(() => {
            welcomeCard.style.display = "none";
            welcomeCard.classList.remove("fade-out");
            // Показываем активный редактор с анимацией появления
            activeContent.classList.add("active");
            editorActive = true;
            document.getElementById("editorBackBtn").style.display = "flex";
            updateEditorTitleByState();
            renderGroupsChips();
            renderGroupContent();
        }, 200);
    }
    
    function deactivateEditor() {
        const welcomeCard = document.getElementById("editorWelcomeCard");
        const activeContent = document.getElementById("editorActiveContent");
        
        // Анимация исчезновения активного редактора
        activeContent.classList.remove("active");
        activeContent.style.opacity = "0";
        setTimeout(() => {
            welcomeCard.style.display = "block";
            welcomeCard.classList.remove("fade-out"); // убедимся, что класс удалён
            editorActive = false;
            document.getElementById("editorBackBtn").style.display = "none";
            updateEditorTitleByState();
            // Сброс поиска
            const searchInput = document.getElementById("searchInput");
            if (searchInput) searchInput.value = "";
            searchTerm = "";
            updateDraftButtons();
            // Убираем opacity, чтобы при следующей активации было нормально
            activeContent.style.opacity = "";
        }, 200);
    }
    
    function newStock() {
        if (hasDraft && !confirm("Есть несохранённый черновик. Обнулить и начать новый?")) return;
        resetAllData();
        activateEditorWithData(false);
    }
    
    function openDraft() {
        if (!hasDraft) {
            showToast("Нет черновика");
            return;
        }
        activateEditorWithData(false);
    }
    
    function generateMessage() {
        let lines = [];
        for (let g of GROUPS) {
            for (let v of g.variants) {
                let parts = [];
                for (let c of getColors(`${g.name} ${v}`)) {
                    let cnt = stock[g.name]?.[v]?.[c] || 0;
                    if (cnt > 0) parts.push(`${cnt}${c}`);
                }
                if (parts.length) lines.push(`${g.name} ${v} - ${parts.join(" ")}`);
            }
        }
        return lines.join("\n") || "(пусто)";
    }
    
    function saveToHistory() {
        let msg = generateMessage();
        let copy = JSON.parse(JSON.stringify(stock));
        savedHistory.unshift({ id: Date.now(), date: new Date().toISOString(), stock: copy, fullMessage: msg });
        if (savedHistory.length>50) savedHistory.pop();
        saveHistory();
        clearDraft();
        resetAllData();
        deactivateEditor();
        showToast("Отчёт сохранён в истории");
        showScreen("welcome");
    }
    
    function renderHistory() {
        let container = document.getElementById("historyList");
        let empty = document.getElementById("historyEmptyMsg");
        if (!container) return;
        if (!savedHistory.length) {
            container.innerHTML = "";
            empty.style.display = "block";
            return;
        }
        empty.style.display = "none";
        container.innerHTML = "";
        for (let entry of savedHistory) {
            let dateStr = new Date(entry.date).toLocaleString();
            let previewText = entry.fullMessage.split("\n")[0] || "";
            if (previewText.length > 50) previewText = previewText.substring(0, 47) + "...";
            let div = document.createElement("div");
            div.className = "history-item";
            div.setAttribute("data-id", entry.id);
            div.innerHTML = `<div><div class="history-date">📅 ${escapeHtml(dateStr)}</div><div class="history-preview">${escapeHtml(previewText)}</div></div><div class="history-right"><span class="history-chevron">›</span></div>`;
            div.onclick = () => openHistoryModal(entry.id, dateStr);
            container.appendChild(div);
        }
    }
    
    let currentHistoryId = null;
    function openHistoryModal(id, dateStr) {
        const entry = savedHistory.find(e => e.id === id);
        if (!entry) return;
        currentHistoryId = id;
        document.getElementById("historyModalTitle").innerHTML = `📅 ${dateStr}`;
        document.getElementById("historyModalMessage").innerText = entry.fullMessage;
        document.getElementById("historyModal").classList.add("active");
    }
    function closeHistoryModal() { document.getElementById("historyModal").classList.remove("active"); currentHistoryId = null; }
    function copyCurrentHistory() { if (currentHistoryId === null) return; const entry = savedHistory.find(e => e.id === currentHistoryId); if (entry) copyToClipboard(entry.fullMessage, "Скопировано"); }
    function editCurrentHistory() {
        if (currentHistoryId === null) return;
        const entry = savedHistory.find(e => e.id === currentHistoryId);
        if (entry) {
            stock = JSON.parse(JSON.stringify(entry.stock));
            saveCurrent();
            checkDraft();
            setEditorDateFromHistory(entry.date);
            activateEditorWithData(false);
            closeHistoryModal();
            showScreen("editor");
        }
    }
    function deleteCurrentHistory() {
        if (currentHistoryId === null) return;
        if (confirm("Удалить этот отчёт?")) {
            savedHistory = savedHistory.filter(e => e.id !== currentHistoryId);
            saveHistory();
            renderHistory();
            closeHistoryModal();
            showToast("Отчёт удалён");
        }
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function showToast(msg) { let toast=document.getElementById("toast"); toast.textContent=msg; toast.style.opacity="1"; setTimeout(()=>toast.style.opacity="0",2000); }
    async function copyToClipboard(text,msg) {
        if(navigator.clipboard && window.isSecureContext) try { await navigator.clipboard.writeText(text); showToast(msg); return; } catch(e){}
        let ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.top="-9999px"; document.body.appendChild(ta); ta.select(); let ok=false; try{ ok=document.execCommand("copy"); }catch(e){} document.body.removeChild(ta); if(ok) showToast(msg); else alert("Скопируйте вручную:\n"+text);
    }
    
    let currentScreenId = "welcome";
    function showScreen(screenId) {
        if (currentScreenId === screenId) return;
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById(`${screenId}Screen`).classList.add("active");
        currentScreenId = screenId;
        document.querySelectorAll(".nav-item").forEach(item => {
            if(item.dataset.screen === screenId) item.classList.add("active");
            else item.classList.remove("active");
        });
        if (screenId === "history") renderHistory();
        if (screenId === "editor") {
            if (!editorActive) {
                document.getElementById("editorWelcomeCard").style.display = "block";
                document.getElementById("editorWelcomeCard").classList.remove("fade-out");
                document.getElementById("editorActiveContent").classList.remove("active");
                document.getElementById("editorBackBtn").style.display = "none";
                updateDraftButtons();
                updateEditorTitleByState();
            } else {
                document.getElementById("editorWelcomeCard").style.display = "none";
                document.getElementById("editorActiveContent").classList.add("active");
                document.getElementById("editorBackBtn").style.display = "flex";
                renderGroupsChips();
                renderGroupContent();
            }
        }
        window.history.pushState({ screen: screenId }, "", `#${screenId}`);
    }
    
    function goBack() {
        if (currentScreenId === "editor" && editorActive) {
            deactivateEditor();
            updateDraftButtons();
            return;
        }
        let screens = ["welcome", "editor", "history"];
        let idx = screens.indexOf(currentScreenId);
        if (idx > 0) showScreen(screens[idx-1]);
        else showToast("Вы на главном экране");
    }
    
    window.addEventListener("popstate", (e) => {
        let hash = window.location.hash.slice(1);
        if (["welcome","editor","history"].includes(hash)) showScreen(hash);
        else showScreen("welcome");
    });
    
    function updateThemeColor() {
        const isDark = document.body.classList.contains('dark');
        const color = isDark ? '#121212' : '#f0f2f5';
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', color);
    }
    
    function updateThemeButtons() {
        const isDark = document.body.classList.contains("dark");
        const btns = document.querySelectorAll("#welcomeThemeToggle, #editorThemeToggle, #historyThemeToggle");
        btns.forEach(btn => {
            if (btn) btn.textContent = isDark ? "🌙" : "☀️";
        });
    }
    
    function applyTheme(mode) {
        if (mode === "light") document.body.classList.remove("dark");
        else if (mode === "dark") document.body.classList.add("dark");
        else if (mode === "system") {
            const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (dark) document.body.classList.add("dark");
            else document.body.classList.remove("dark");
        }
        updateThemeColor();
        updateThemeButtons();
    }
    
    function highlightThemeInModal() {
        document.getElementById("themeLightBtn").classList.remove("theme-btn-active");
        document.getElementById("themeDarkBtn").classList.remove("theme-btn-active");
        document.getElementById("themeSystemBtn").classList.remove("theme-btn-active");
        if (currentThemeMode === "light") document.getElementById("themeLightBtn").classList.add("theme-btn-active");
        else if (currentThemeMode === "dark") document.getElementById("themeDarkBtn").classList.add("theme-btn-active");
        else if (currentThemeMode === "system") document.getElementById("themeSystemBtn").classList.add("theme-btn-active");
    }
    
    function setThemeMode(mode) {
        currentThemeMode = mode;
        if (mode === "system") localStorage.removeItem("theme");
        else localStorage.setItem("theme", mode);
        applyTheme(mode);
        highlightThemeInModal();
        closeThemeModal();
    }
    
    function initTheme() {
        const saved = localStorage.getItem("theme");
        if (saved === "light") currentThemeMode = "light";
        else if (saved === "dark") currentThemeMode = "dark";
        else currentThemeMode = "system";
        applyTheme(currentThemeMode);
        highlightThemeInModal();
        const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
        darkModeMedia.addEventListener('change', () => {
            if (currentThemeMode === "system") applyTheme("system");
        });
    }
    
    const themeModal = document.getElementById("themeModal");
    function showThemeModal() { highlightThemeInModal(); themeModal.classList.add("active"); }
    function closeThemeModal() { themeModal.classList.remove("active"); }
    
    let deferredPrompt;
    const installBanner = document.getElementById("installBanner");
    window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (installBanner) installBanner.style.display = "block";
    });
    if (installBanner) {
        installBanner.addEventListener("click", async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === "accepted") installBanner.style.display = "none";
            deferredPrompt = null;
        });
    }
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(console.error));
    }
    
    document.addEventListener("DOMContentLoaded", () => {
        loadData();
        initTheme();
        deactivateEditor();
        updateDraftButtons();
        
        // Подсветка таб-бара при загрузке
        document.querySelectorAll(".nav-item").forEach(btn => {
            btn.onclick = () => showScreen(btn.dataset.screen);
            if (btn.dataset.screen === "welcome") btn.classList.add("active");
        });
        
        document.getElementById("editorBackBtn").onclick = () => goBack();
        document.getElementById("historyBackBtn").onclick = () => goBack();
        document.getElementById("goToEditorBtn").onclick = () => showScreen("editor");
        
        document.getElementById("newInEditorBtn").onclick = newStock;
        document.getElementById("draftInEditorBtn").onclick = openDraft;
        document.getElementById("resetActiveBtn").onclick = () => {
            if (confirm("Обнулить все остатки?")) {
                resetAllData();
                if (editorActive) renderGroupContent();
            }
        };
        document.getElementById("finishActiveBtn").onclick = () => {
            document.getElementById("modalPreviewMessage").innerText = generateMessage();
            document.getElementById("previewModal").classList.add("active");
        };
        
        const searchInput = document.getElementById("searchInput");
        const clearBtn = document.getElementById("searchClearBtn");
        searchInput.addEventListener("input", (e) => {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => {
                searchTerm = e.target.value.toLowerCase();
                if (editorActive) renderGroupsChips();
                clearBtn.style.display = searchTerm ? "block" : "none";
            }, 200);
        });
        clearBtn.onclick = () => {
            searchInput.value = "";
            searchTerm = "";
            if (editorActive) renderGroupsChips();
            clearBtn.style.display = "none";
            scrollToActiveGroupChip();
        };
        
        document.getElementById("clearHistoryBtn").onclick = () => {
            if(confirm("Очистить всю историю?")) {
                savedHistory = [];
                saveHistory();
                renderHistory();
            }
        };
        
        const previewModal = document.getElementById("previewModal");
        document.getElementById("modalCopyFinishBtn").onclick = async () => {
            const msg = generateMessage();
            await copyToClipboard(msg, "✅ Скопировано и сохранено!");
            saveToHistory();
            previewModal.classList.remove("active");
            showScreen("welcome");
        };
        document.getElementById("previewModalCloseBtn").onclick = () => previewModal.classList.remove("active");
        previewModal.addEventListener("click", (e) => { if(e.target === previewModal) previewModal.classList.remove("active"); });
        
        document.getElementById("historyModalCopyBtn").onclick = copyCurrentHistory;
        document.getElementById("historyModalEditBtn").onclick = editCurrentHistory;
        document.getElementById("historyModalDeleteBtn").onclick = deleteCurrentHistory;
        document.getElementById("historyModalCloseBtn").onclick = closeHistoryModal;
        document.getElementById("historyModal").addEventListener("click", (e) => { if(e.target === document.getElementById("historyModal")) closeHistoryModal(); });
        
        document.getElementById("welcomeThemeToggle").onclick = showThemeModal;
        document.getElementById("editorThemeToggle").onclick = showThemeModal;
        document.getElementById("historyThemeToggle").onclick = showThemeModal;
        document.getElementById("themeLightBtn").onclick = () => setThemeMode("light");
        document.getElementById("themeDarkBtn").onclick = () => setThemeMode("dark");
        document.getElementById("themeSystemBtn").onclick = () => setThemeMode("system");
        document.getElementById("themeModalCloseBtn").onclick = closeThemeModal;
        themeModal.addEventListener("click", (e) => { if(e.target === themeModal) closeThemeModal(); });
        
        currentScreenId = "welcome";
        // Убедимся, что welcomeScreen активен и таб-бар подсвечен
        if (!document.getElementById("welcomeScreen").classList.contains("active")) {
            showScreen("welcome");
        }
    });
})();
