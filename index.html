    <script>
  // Определяем тему: сначала из localStorage, затем из системных предпочтений
  function getThemePreference() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') return 'dark';
    if (saved === 'light') return 'light';
    const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
    return darkModeMedia.matches ? 'dark' : 'light';
  }
  const theme = getThemePreference();
  const manifestLink = document.createElement('link');
  manifestLink.rel = 'manifest';
  manifestLink.href = theme === 'dark' ? './manifest-dark.json' : './manifest-light.json';
  document.head.appendChild(manifestLink);
</script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

            --bg-page: #f8f9fc; --surface: #ffffff; --surface-2: #f1f3f7;

        /* Шапка: центровка заголовка через flex + absolute для кнопок */
        .app-header {
            position: relative;
            display: flex;

        .groups-chips { display: inline-flex; gap: 8px; padding: 2px 0; }

        .counter input { width: 40px; text-align: center; font-size: 0.9rem; font-weight: 500; background: transparent; border: none; color: var(--text-primary); font-family: monospace; outline: none; }
        .counter input::-webkit-outer-spin-button, .counter input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--overlay-bg); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; visibility: hidden; opacity: 0; transition: opacity 0.2s, visibility 0.2s; padding: 20px; }

        @media (max-width: 480px) { .app-header h1 { font-size: 1rem; } .welcome-header h1 { font-size: 1.3rem; } }
    </style>

<body>
<div id="toast" class="toast"></div>
<div class="app-container">

<script>
(function(){
    const GROUPS = [
        { name: "X", variants: ["64","256"] }, { name: "XS", variants: ["64","256","512"] }, { name: "XS Max", variants: ["64","256","512"] },
        { name: "XR", variants: ["64","128","256"] }, { name: "11", variants: ["64","128","256"] }, { name: "11 Pro", variants: ["64","256","512"] },
        { name: "11 Pro Max", variants: ["64","256","512"] }, { name: "12 Mini", variants: ["64","128","256"] }, { name: "12", variants: ["64","128","256"] },
        { name: "12 Pro", variants: ["128","256","512"] }, { name: "12 Pro Max", variants: ["128","256","512"] }, { name: "13 Mini", variants: ["128","256","512"] },
        { name: "13", variants: ["128","256","512"] }, { name: "13 Pro", variants: ["128","256","512","1TB"] }, { name: "13 Pro Max", variants: ["128","256","512","1TB"] },
        { name: "14", variants: ["128","256","512"] }, { name: "14 Plus", variants: ["128","256","512"] }, { name: "14 Pro", variants: ["128","256","512","1TB"] },
        { name: "14 Pro Max", variants: ["128","256","512","1TB"] }, { name: "15", variants: ["128","256","512"] }, { name: "15 Plus", variants: ["128","256","512"] },
        { name: "15 Pro", variants: ["128","256","512","1TB"] }, { name: "15 Pro Max", variants: ["256","512","1TB"] }, { name: "16", variants: ["128","256","512"] },
        { name: "16 Plus", variants: ["128","256","512"] }, { name: "16 Pro", variants: ["128","256","512","1TB"] }, { name: "16 Pro Max", variants: ["256","512","1TB"] }
    ];

    function getColors(modelName) {
        let colors;
        if (modelName.startsWith("X ")) colors = ["🖤","🤍"];
        else if (modelName.includes("XS")) colors = ["🖤","🤍","💛"];
        else if (modelName.includes("XR")) colors = ["🖤","🤍","💙","💛","🧡","❤️"];
        else if (modelName.startsWith("11 ") && !modelName.includes("Pro")) colors = ["🖤","🤍","💚","💛","❤️","💜"];
        else if (modelName.includes("11 Pro")) colors = ["🖤","🤍","💚","💛"];
        else if (modelName.includes("12 Mini") || modelName === "12 64" || modelName === "12 128" || modelName === "12 256") colors = ["🖤","🤍","💚","💙","❤️","💜"];
        else if (modelName.includes("12 Pro") && !modelName.includes("Max")) colors = ["🖤","🤍","💛","💙"];
        else if (modelName.includes("12 Pro Max")) colors = ["🖤","🤍","💛","💙"];
        else if (modelName.includes("13 Mini")) colors = ["🖤","🤍","💙","🩷","💚","❤️"];
        else if (modelName.startsWith("13 ") && !modelName.includes("Pro")) colors = ["🖤","🤍","💙","🩷","💚","❤️"];
        else if (modelName.includes("13 Pro")) colors = ["🖤","🤍","💙","💛","💚"];
        else if (modelName.includes("14 Plus")) colors = ["🖤","🤍","💙","💜","💛"];
        else if (modelName.includes("14 Pro")) colors = ["🖤","🤍","💜","💛"];
        else if (modelName.startsWith("14 ") && !modelName.includes("Plus") && !modelName.includes("Pro")) colors = ["🖤","🤍","💙","💜","❤️","💛"];
        else if ((modelName.startsWith("15 ") && !modelName.includes("Pro")) || modelName.includes("15 Plus")) colors = ["🖤","💙","💚","🩷","💛"];
        else if (modelName.includes("15 Pro")) colors = ["🖤","🤍","💙","🩶"];
        else if ((modelName.startsWith("16 ") && !modelName.includes("Pro")) || modelName.includes("16 Plus")) colors = ["🖤","🤍","💙","🩷","💚"];
        else if (modelName.includes("16 Pro")) colors = ["🖤","🤍","🩶","💛"];
        else colors = ["🖤","🤍","💛","💚","💙","❤️","🩷"];
        
        const hasRed = colors.includes("❤️");
        const hasYellow = colors.includes("💛");
        if (hasRed) colors = colors.filter(c => c !== "❤️");
        if (hasYellow) colors = colors.filter(c => c !== "💛");
        if (hasRed) colors.push("❤️");
        if (hasYellow) colors.push("💛");
        return colors;
    }

    function getColorName(color, modelName) {
        if (color !== "💛") {
            const staticNames = { "🖤":"чёрный","🤍":"белый","🧡":"коралловый","💚":"зелёный","💙":"синий","💜":"фиолетовый","❤️":"красный","🩷":"розовый","🩶":"титан" };
            return staticNames[color] || color;
        }
        const isXS = modelName.includes("XS");
        const isPro = modelName.includes("Pro");
        const is16Pro = modelName.includes("16 Pro");
        if (is16Pro) return "пустынный";
        if (isXS || isPro) return "золотой";
        return "жёлтый";
    }

    let stock = {}, savedHistory = [], searchTerm = "", selectedGroup = GROUPS[0].name, selectedVariant = {}, hasDraft = false, searchDebounce;
    let currentEditDate = null;
    let userThemeOverride = false; // false - следовать системе, true - фиксированная тема
    const STORAGE_CURRENT = "sklad_grouped", STORAGE_HISTORY = "sklad_history", STORAGE_SELECTED_GROUP = "sklad_selected_group";

    // PWA установка
    let deferredPrompt;
    const installBanner = document.getElementById("installBanner");

    function initStock() { let st = {}; for (let g of GROUPS) { st[g.name] = {}; for (let v of g.variants) { st[g.name][v] = {}; let cols = getColors(`${g.name} ${v}`); for (let c of cols) st[g.name][v][c] = 0; } } return st; }
    function loadData() {
        let saved = localStorage.getItem(STORAGE_CURRENT); if (saved) try { stock = JSON.parse(saved); } catch(e) { stock = initStock(); } else stock = initStock();
        for (let g of GROUPS) { if (!stock[g.name]) stock[g.name] = {}; for (let v of g.variants) { if (!stock[g.name][v]) stock[g.name][v] = {}; let cols = getColors(`${g.name} ${v}`); for (let c of cols) if (stock[g.name][v][c] === undefined) stock[g.name][v][c] = 0; } }
        let savedHist = localStorage.getItem(STORAGE_HISTORY); if (savedHist) try { savedHistory = JSON.parse(savedHist); } catch(e) { savedHistory = []; } if (!Array.isArray(savedHistory)) savedHistory = [];
        let savedGroup = localStorage.getItem(STORAGE_SELECTED_GROUP); if (savedGroup && GROUPS.some(g => g.name === savedGroup)) selectedGroup = savedGroup; else selectedGroup = GROUPS[0].name;
        for (let g of GROUPS) if (!selectedVariant[g.name]) selectedVariant[g.name] = g.variants[0];
        checkDraft();
        setEditorDateFromNow();
    }
    function saveCurrent() { localStorage.setItem(STORAGE_CURRENT, JSON.stringify(stock)); }
    function saveHistory() { if (savedHistory.length>50) savedHistory=savedHistory.slice(0,50); localStorage.setItem(STORAGE_HISTORY, JSON.stringify(savedHistory)); }
    function saveSelectedGroup() { localStorage.setItem(STORAGE_SELECTED_GROUP, selectedGroup); }
    function checkDraft() { for (let g of GROUPS) for (let v of g.variants) for (let c of getColors(`${g.name} ${v}`)) if ((stock[g.name]?.[v]?.[c]||0) !== 0) { hasDraft = true; return; } hasDraft = false; }
    function setDraft() { if (!hasDraft) { hasDraft=true; let btn=document.getElementById("draftFromWelcomeBtn"); if(btn) btn.style.display="flex"; } }
    function clearDraft() { hasDraft=false; let btn=document.getElementById("draftFromWelcomeBtn"); if(btn) btn.style.display="none"; }
    
    function formatDate(date) { let d = new Date(date); return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`; }
    function setEditorDateFromNow() { currentEditDate = new Date(); updateEditorTitle(); }
    function setEditorDateFromHistory(dateStr) { currentEditDate = new Date(dateStr); updateEditorTitle(); }
    function updateEditorTitle() { const titleElem = document.getElementById("editorTitle"); if (titleElem && currentEditDate) { titleElem.textContent = `Склад-расклад от ${formatDate(currentEditDate)}`; } }
    
    function resetAll() {
        for (let g of GROUPS) for (let v of g.variants) for (let c of getColors(`${g.name} ${v}`)) stock[g.name][v][c] = 0;
        saveCurrent(); clearDraft(); selectedGroup = GROUPS[0].name; saveSelectedGroup(); for (let g of GROUPS) selectedVariant[g.name] = g.variants[0];
        setEditorDateFromNow();
        if (document.getElementById("editorScreen").classList.contains("active")) { renderGroupsChips(); renderGroupContent(); }
    }
    function generateMessage() { let lines = []; for (let g of GROUPS) { for (let v of g.variants) { let parts = []; for (let c of getColors(`${g.name} ${v}`)) { let cnt = stock[g.name]?.[v]?.[c] || 0; if (cnt > 0) parts.push(`${cnt}${c}`); } if (parts.length) lines.push(`${g.name} ${v} - ${parts.join(" ")}`); } } return lines.join("\n") || "(пусто)"; }
    function saveToHistory() { let msg = generateMessage(); let copy = JSON.parse(JSON.stringify(stock)); savedHistory.unshift({ id: Date.now(), date: new Date().toISOString(), stock: copy, fullMessage: msg }); if (savedHistory.length>50) savedHistory.pop(); saveHistory(); clearDraft(); }
    function updateStock(group, variant, color, val) { stock[group][variant][color] = val; saveCurrent(); setDraft(); renderGroupContent(); }

    function scrollToActiveGroupChip() { 
        const activeChip = document.querySelector(".group-chip.active");
        if (activeChip) activeChip.scrollIntoView({ behavior: "auto", block: "nearest", inline: "center" });
    }

    let groupsChipsContainer = null;
    
    function renderGroupsChips() {
        const container = document.getElementById("groupsChips");
        if (!container) return;
        groupsChipsContainer = container;
        let filteredGroups = GROUPS;
        if (searchTerm) filteredGroups = GROUPS.filter(g => g.name.toLowerCase().includes(searchTerm.toLowerCase()));
        
        container.innerHTML = "";
        for (let g of filteredGroups) { 
            let chip = document.createElement("div"); 
            chip.className = "group-chip"; 
            if (selectedGroup === g.name) chip.classList.add("active"); 
            chip.textContent = g.name; 
            chip.onclick = (e) => {
                e.stopPropagation();
                if (selectedGroup === g.name) return;
                for (let child of container.children) child.classList.remove("active");
                chip.classList.add("active");
                selectedGroup = g.name;
                saveSelectedGroup();
                renderGroupContent();
                scrollToActiveGroupChip();
            };
            container.appendChild(chip); 
        }
        if (filteredGroups.length === 0) { 
            let emptyDiv = document.createElement("div"); 
            emptyDiv.textContent = "😕 Модели не найдены"; 
            emptyDiv.style.padding = "10px"; 
            emptyDiv.style.color = "var(--text-tertiary)"; 
            container.appendChild(emptyDiv); 
        }
        scrollToActiveGroupChip();
    }

    let animationTimer = null;
    function renderGroupContent() {
        const group = GROUPS.find(g => g.name === selectedGroup); if (!group) return;
        const colorsContainer = document.getElementById("colorsList");
        if (!colorsContainer) return;
        
        colorsContainer.classList.add("fade-out");
        if (animationTimer) clearTimeout(animationTimer);
        animationTimer = setTimeout(() => {
            document.getElementById("groupTitle").textContent = group.name;
            
            const variantsContainer = document.getElementById("variantsChips");
            const currentVariant = selectedVariant[group.name] || group.variants[0];
            variantsContainer.innerHTML = "";
            for (let v of group.variants) { 
                let chip = document.createElement("div"); 
                chip.className = "chip"; 
                if (currentVariant === v) chip.classList.add("active"); 
                chip.textContent = v; 
                chip.onclick = (e) => { 
                    e.stopPropagation(); 
                    if (selectedVariant[group.name] === v) return;
                    for (let child of variantsContainer.children) child.classList.remove("active");
                    chip.classList.add("active");
                    selectedVariant[group.name] = v; 
                    renderGroupContent(); 
                }; 
                variantsContainer.appendChild(chip); 
            }
            
            const fullModelName = `${group.name} ${currentVariant}`; 
            const colors = getColors(fullModelName);
            colorsContainer.innerHTML = "";
            for (let col of colors) {
                let val = stock[group.name][currentVariant][col] || 0;
                let row = document.createElement("div"); row.className = "color-row";
                let left = document.createElement("div"); left.className = "color-info"; 
                left.innerHTML = `<span class="color-icon">${col}</span><span class="color-name">${getColorName(col, fullModelName)}</span>`; 
                row.appendChild(left);
                let counter = document.createElement("div"); counter.className = "counter";
                let btnMinus = document.createElement("button"); btnMinus.textContent = "−"; 
                btnMinus.onclick = (e) => { e.stopPropagation(); let newVal = Math.max(0, val-1); updateStock(group.name, currentVariant, col, newVal); };
                let input = document.createElement("input"); input.type = "number"; input.value = val; 
                input.onchange = (e) => { let vv = parseInt(e.target.value); if(isNaN(vv)) vv=0; if(vv<0) vv=0; updateStock(group.name, currentVariant, col, vv); };
                let btnPlus = document.createElement("button"); btnPlus.textContent = "+"; 
                btnPlus.onclick = (e) => { e.stopPropagation(); updateStock(group.name, currentVariant, col, val+1); };
                counter.append(btnMinus, input, btnPlus); row.appendChild(counter); colorsContainer.appendChild(row);
            }
            colorsContainer.classList.remove("fade-out");
        }, 120);
    }

    function renderHistory() { 
        let container = document.getElementById("historyList"); let empty = document.getElementById("historyEmptyMsg"); 
        if (!container) return; 
        if (!savedHistory.length) { container.innerHTML=""; empty.style.display="block"; return; } 
        empty.style.display="none"; container.innerHTML = ""; 
        for (let entry of savedHistory) { 
            let dateStr = new Date(entry.date).toLocaleString(); 
            let previewText = entry.fullMessage.split("\n")[0] || ""; 
            if (previewText.length > 50) previewText = previewText.substring(0, 47) + "..."; 
            let div = document.createElement("div"); div.className = "history-item"; div.setAttribute("data-id", entry.id); 
            div.innerHTML = `<div><div class="history-date">📅 ${escapeHtml(dateStr)}</div><div class="history-preview">${escapeHtml(previewText)}</div></div><div class="history-right"><span class="history-chevron">›</span></div>`; 
            div.onclick = () => openHistoryModal(entry.id, dateStr); 
            container.appendChild(div); 
        } 
    }
    
    let currentHistoryId = null;
    function openHistoryModal(id, dateStr) { 
        const entry = savedHistory.find(e => e.id === id); if (!entry) return; currentHistoryId = id; 
        document.getElementById("historyModalTitle").innerHTML = `📅 ${dateStr}`;
        document.getElementById("historyModalMessage").innerText = entry.fullMessage; 
        document.getElementById("historyModal").classList.add("active"); 
    }
    function closeHistoryModal() { document.getElementById("historyModal").classList.remove("active"); currentHistoryId = null; }
    function copyCurrentHistory() { if (currentHistoryId === null) return; const entry = savedHistory.find(e => e.id === currentHistoryId); if (entry) copyToClipboard(entry.fullMessage, "Скопировано"); }
    function editCurrentHistory() { 
        if (currentHistoryId === null) return; 
        const entry = savedHistory.find(e => e.id === currentHistoryId); 
        if (entry) { 
            stock = JSON.parse(JSON.stringify(entry.stock)); saveCurrent(); checkDraft(); 
            setEditorDateFromHistory(entry.date);
            renderGroupsChips(); renderGroupContent(); showScreen("editor"); closeHistoryModal(); 
        } 
    }
    function deleteCurrentHistory() { if (currentHistoryId === null) return; if (confirm("Удалить этот отчёт?")) { savedHistory = savedHistory.filter(e => e.id !== currentHistoryId); saveHistory(); renderHistory(); closeHistoryModal(); showToast("Отчёт удалён"); } }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function showToast(msg) { let toast=document.getElementById("toast"); toast.textContent=msg; toast.style.opacity="1"; setTimeout(()=>toast.style.opacity="0",2000); }
    async function copyToClipboard(text,msg) { if(navigator.clipboard && window.isSecureContext) try { await navigator.clipboard.writeText(text); showToast(msg); return; } catch(e){} let ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.top="-9999px"; document.body.appendChild(ta); ta.select(); let ok=false; try{ ok=document.execCommand("copy"); }catch(e){} document.body.removeChild(ta); if(ok) showToast(msg); else alert("Скопируйте вручную:\n"+text); }
    const previewModal = document.getElementById("previewModal"); const modalMessage = document.getElementById("modalPreviewMessage");
    function showPreviewModal() { modalMessage.innerText = generateMessage(); previewModal.classList.add("active"); }
    function closePreviewModal() { previewModal.classList.remove("active"); }
    async function onModalCopyFinish() { const msg = generateMessage(); await copyToClipboard(msg, "✅ Скопировано и сохранено!"); saveToHistory(); closePreviewModal(); showScreen("welcome"); renderGroupsChips(); renderGroupContent(); }
    let currentScreenId = "welcome";
    function showScreen(screenId) { if (currentScreenId === screenId) return; document.querySelectorAll(".screen").forEach(s => s.classList.remove("active")); document.getElementById(`${screenId}Screen`).classList.add("active"); currentScreenId = screenId; document.querySelectorAll(".nav-item").forEach(item => { if(item.dataset.screen === screenId) item.classList.add("active"); else item.classList.remove("active"); }); if (screenId === "history") renderHistory(); if (screenId === "editor") { renderGroupsChips(); renderGroupContent(); } window.history.pushState({ screen: screenId }, "", `#${screenId}`); }
    function goBack() { let screens = ["welcome", "editor", "history"]; let idx = screens.indexOf(currentScreenId); if (idx > 0) showScreen(screens[idx-1]); else showToast("Вы на главном экране"); }
    window.addEventListener("popstate", (e) => { let hash = window.location.hash.slice(1); if (["welcome","editor","history"].includes(hash)) showScreen(hash); else showScreen("welcome"); });
    window.history.replaceState({ screen: "welcome" }, "", "#welcome");
    
    // Динамический цвет статус-бара
    function updateThemeColor() {
        const isDark = document.body.classList.contains('dark');
        const color = isDark ? '#121212' : '#f0f2f5';
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', color);
    }
    
   function initTheme() {
    let saved = localStorage.getItem("theme");
    if (saved === "dark" || saved === "light") {
        userThemeOverride = true;
        if (saved === "dark") document.body.classList.add("dark");
        else document.body.classList.remove("dark");
    } else {
        userThemeOverride = false;
        // Следуем системе
        const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
        if (darkModeMedia.matches) document.body.classList.add("dark");
        else document.body.classList.remove("dark");
    }
    updateThemeColor();
    updateThemeButtons();
}
    function updateThemeButtons() { 
        let isDark = document.body.classList.contains("dark"); 
        document.querySelectorAll(".icon-btn, #welcomeThemeToggle, #editorThemeToggle, #historyThemeToggle").forEach(btn => { 
            if (btn.textContent === "🌙" || btn.textContent === "☀️") btn.textContent = isDark ? "☀️" : "🌙"; 
        }); 
    }
    function toggleTheme() {
    userThemeOverride = true;
    if (document.body.classList.contains("dark")) {
        document.body.classList.remove("dark");
        localStorage.setItem("theme", "light");
    } else {
        document.body.classList.add("dark");
        localStorage.setItem("theme", "dark");
    }
    updateThemeColor();
    updateThemeButtons();
}

    function applySystemTheme() {
    if (userThemeOverride) return; // пользователь выбрал вручную, не трогаем
    const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
    if (darkModeMedia.matches) {
        document.body.classList.add("dark");
        localStorage.removeItem("theme"); // убираем сохранённую, чтобы не зафиксировать
    } else {
        document.body.classList.remove("dark");
        localStorage.removeItem("theme");
    }
    updateThemeColor();
    updateThemeButtons();
}
    
    // PWA installation
    window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (installBanner) installBanner.style.display = "block";
    });
    if (installBanner) {
        installBanner.addEventListener("click", async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === "accepted") {
                installBanner.style.display = "none";
            }
            deferredPrompt = null;
        });
    }
    
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { 
            navigator.serviceWorker.register('./sw.js').catch(console.error); 
        });
    }
    
    document.addEventListener("DOMContentLoaded", () => {
        loadData(); initTheme(); renderGroupsChips(); renderGroupContent();
        document.querySelectorAll(".nav-item").forEach(btn => { btn.onclick = () => showScreen(btn.dataset.screen); });
        document.getElementById("editorBackBtn").onclick = () => goBack(); document.getElementById("historyBackBtn").onclick = () => goBack();
        document.getElementById("newFromWelcomeBtn").onclick = () => { if (hasDraft && confirm("Есть несохранённый черновик. Обнулить и начать новый?")) resetAll(); else if (!hasDraft) resetAll(); showScreen("editor"); };
        document.getElementById("draftFromWelcomeBtn").onclick = () => showScreen("editor"); document.getElementById("historyFromWelcomeBtn").onclick = () => showScreen("history");
        document.getElementById("welcomeThemeToggle").onclick = toggleTheme; document.getElementById("resetBtn").onclick = () => { if(confirm("Обнулить все остатки?")) resetAll(); };
        document.getElementById("finishBtn").onclick = () => showPreviewModal(); document.getElementById("editorThemeToggle").onclick = toggleTheme;
        const searchInput = document.getElementById("searchInput"); const clearBtn = document.getElementById("searchClearBtn");
        searchInput.addEventListener("input", (e) => { clearTimeout(searchDebounce); searchDebounce = setTimeout(() => { searchTerm = e.target.value.toLowerCase(); renderGroupsChips(); clearBtn.style.display = searchTerm ? "block" : "none"; }, 200); });
        clearBtn.onclick = () => { searchInput.value = ""; searchTerm = ""; renderGroupsChips(); clearBtn.style.display = "none"; scrollToActiveGroupChip(); };
        document.getElementById("clearHistoryBtn").onclick = () => { if(confirm("Очистить всю историю?")) { savedHistory = []; saveHistory(); renderHistory(); } };
        document.getElementById("historyThemeToggle").onclick = toggleTheme;
        document.getElementById("modalCopyFinishBtn").onclick = onModalCopyFinish; document.getElementById("previewModalCloseBtn").onclick = closePreviewModal; previewModal.addEventListener("click", (e) => { if(e.target === previewModal) closePreviewModal(); });
        document.getElementById("historyModalCopyBtn").onclick = copyCurrentHistory; document.getElementById("historyModalEditBtn").onclick = editCurrentHistory; document.getElementById("historyModalDeleteBtn").onclick = deleteCurrentHistory; document.getElementById("historyModalCloseBtn").onclick = closeHistoryModal; document.getElementById("historyModal").addEventListener("click", (e) => { if(e.target === document.getElementById("historyModal")) closeHistoryModal(); });
        if (hasDraft) document.getElementById("draftFromWelcomeBtn").style.display = "flex";
        // Следим за изменением системной темы
        const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
        darkModeMedia.addEventListener('change', applySystemTheme);
    });
})();
</script>
</body>
</html>
